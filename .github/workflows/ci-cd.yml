name: CI/CD Pipeline

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ============================================
  # LINUX BUILD & TEST
  # ============================================
  build-linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        components: rustfmt, clippy
        targets: x86_64-unknown-linux-gnu

    - name: Cache Cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libxcb-render0-dev \
          libxcb-shape0-dev \
          libxcb-xfixes0-dev \
          libxkbcommon-dev \
          libssl-dev \
          pkg-config \
          libgtk-3-dev \
          libfontconfig1-dev \
          protobuf-compiler

    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Run Clippy
      run: cargo clippy --workspace --all-targets -- -W clippy::all

    - name: Build workspace
      run: cargo build --workspace --verbose

    - name: Run tests
      run: cargo test --workspace --verbose --no-fail-fast

    - name: Build release
      run: cargo build --release --workspace

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: strataforge-linux
        path: target/release/sf-app*
        if-no-files-found: ignore

  # ============================================
  # WINDOWS BUILD & TEST
  # ============================================
  build-windows:
    name: Build & Test (Windows)
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        components: rustfmt, clippy
        targets: x86_64-pc-windows-msvc

    - name: Cache Cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Install dependencies (Windows only)
      if: runner.os == 'Windows'
      run: |
        choco install protoc sqlite -y
        echo "C:\ProgramData\chocolatey\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Run Clippy
      run: cargo clippy --workspace --all-targets --target x86_64-pc-windows-msvc -- -W clippy::all

    - name: Build workspace
      run: cargo build --workspace --verbose --target x86_64-pc-windows-msvc

    - name: Run tests
      run: cargo test --workspace --verbose --no-fail-fast --target x86_64-pc-windows-msvc

    - name: Build release
      run: cargo build --release --workspace --target x86_64-pc-windows-msvc

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: strataforge-windows
        path: target/x86_64-pc-windows-msvc/release/sf-app*
        if-no-files-found: ignore

  # ============================================
  # COVERAGE JOB
  # ============================================
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    if: always()

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        components: llvm-tools-preview
        targets: x86_64-unknown-linux-gnu

    - name: Install cargo-tarpaulin
      run: cargo install cargo-tarpaulin || true

    - name: Run coverage
      run: cargo tarpaulin --workspace --out Xml --output-dir coverage || true

    - name: Upload to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage/cobertura.xml
        flags: unittests
        fail_ci_if_error: false
